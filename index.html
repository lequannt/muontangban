<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Women's Day</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffeaf4);
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.container{
z-index:2;
}

.flower{
font-size:90px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.title{
font-size:34px;
font-weight:600;
margin-top:10px;
color:#d63384;
}

.subtitle{
margin-top:25px;
font-size:18px;
cursor:pointer;
color:#ff2e93;
background:white;
padding:12px 26px;
border-radius:40px;
display:inline-block;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:.3s;
}

.subtitle:hover{
transform:scale(1.05);
}

.letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:340px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
transition:1s;
}

.letter.show{
transform:translate(-50%,-50%) scale(1);
}

.message{
font-size:18px;
line-height:1.6;
color:#444;
}

.hearts span{
position:absolute;
color:#ff4da6;
font-size:22px;
animation:rise 6s linear infinite;
opacity:.7;
}

@keyframes rise{
0%{transform:translateY(100vh) scale(0.5);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh) scale(1.2);opacity:0}
}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="container">

<div class="flower">🌸</div>

<div class="title">Happy Woman's Day 8/3</div>

<div class="subtitle" onclick="openLetter()">Click here 💌</div>

</div>

<div class="letter" id="letter">

<div class="message">
Hôm nay là ngày 8/3 chúc cậu mãi lạc quan yêu đời, luôn hạnh phúc, vui vẻ và may mắn trong cuộc sống nhé.

<br><br>
<b>Happy Woman's Day ❤️</b>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

function openLetter(){

let letter=document.getElementById("letter");
letter.classList.add("show");

// hide the first screen so the letter is easier to read
let container=document.querySelector(".container");
container.style.display="none";

let music=document.getElementById("music");
music.play();

}

function createHearts(){

const hearts=document.querySelector(".hearts");

setInterval(()=>{

let heart=document.createElement("span");
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";
heart.style.animationDuration=(Math.random()*3+4)+"s";

hearts.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

},400);

}

createHearts();

</script>

</body>
</html>
